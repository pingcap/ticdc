name: Build

on:
  push:
    branches:
      - master
      - "release-[0-9].[0-9]*"
      - "release-nextgen-[0-9]*"
    paths-ignore:
      - '**/*.md'
      - '**/OWNERS'
      - 'OWNERS'
      - 'OWNERS_ALIASES'

  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - master
      - "release-[0-9].[0-9]*"
      - "release-nextgen-[0-9]*"
    paths-ignore:
      - '**/*.md'
      - '**/OWNERS'
      - 'OWNERS'
      - 'OWNERS_ALIASES'

# See: https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions#concurrency.
concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  mac_build:
    name: Mac OS Build - ${{ matrix.task.name }}
    if: >-
      ${{
        (matrix.task.architecture == 'classic' &&
          ((github.base_ref || github.ref_name) == 'master' ||
            !startsWith(github.base_ref || github.ref_name, 'release-nextgen-'))) ||
        (matrix.task.architecture == 'nextgen' &&
          ((github.base_ref || github.ref_name) == 'master' ||
            startsWith(github.base_ref || github.ref_name, 'release-nextgen-')))
      }}
    runs-on: macos-latest
    strategy:
      fail-fast: true
      matrix:
        task:
          - name: Build Classic CDC
            command: make cdc
            architecture: classic
          - name: Build Next Gen CDC
            command: NEXT_GEN=1 make cdc
            architecture: nextgen
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v3

      - name: Setup Go environment
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Cache Tools
        id: cache-tools
        uses: actions/cache@v3
        with:
          path: tools/bin
          key: macos-latest-ticdc-tools-${{ hashFiles('tools/check/go.sum') }}

      - name: ${{ matrix.task.name }}
        run: ${{ matrix.task.command }}
