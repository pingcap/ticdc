# diff Configuration.

check-thread-count = 4

export-fix-sql = true

check-struct-only = false

[task]
    output-dir = "/tmp/tidb_cdc_test/cmek_keyspace/sync_diff/output"

    source-instances = ["mysql1"]

    target-instance = "tidb0"

    target-check-tables = ["cmek_valid.t"]

[data-sources]
